<!DOCTYPE html>
<html>

<head>
    <title>Quick Note taker</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            background: #f4f4f4;
        }

        textarea {
            width: 95%;
            height: 60vh;
            font-size: 18px;
            padding: 15px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #316357;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>📓Quick Note Taker</h1>
    <textarea id="note" placeholder="Start typing your note..."></textarea>
    <br><br>
    <button id="save">💾Save Note</button>
    <button id="save-as">📂 Save As</button>
    <p id="save_status" style="color: gray; font-size: 14px;"></p>
    <button id="deleteBtn" style="background: #f44336;"> Delete All</button>
    <div id="status" style=" margin-top:10px; color: #666; font-size:0.9em;">
        <script src="renderer.js"></script>
</body>

</html>
